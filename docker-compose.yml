version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: radio-gorka-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: radio-gorka-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
